# Kopējiet uz .github/workflows/deploy.yml un aizpildiet GitHub Secrets (FTP_HOST, FTP_USER, FTP_PASS, FTP_REMOTE_PATH).
# Līdz tam NEIEVIETO workflows/ — citādi Actions mēģinās palaist un sūtīs kļūdu e-pastus.

name: Deploy gallery to klientiem

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SFTP upload web/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./web/
          server-dir: ${{ secrets.FTP_REMOTE_PATH }}/
          exclude: |
            **/config.php
            **/storage/galleries/**
            **/storage/booth_events/**
