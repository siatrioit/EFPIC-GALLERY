---
# Pēc Pull: kopē web/ no repo/ uz dzīvo vietni (api/, public/).
# Clone ceļš: .../klientiem.edgarsfoto.lv/repo — DEPLOYPATH = vecāks (bez /repo).
deployment:
  tasks:
    - export DEPLOYPATH=/home2/trioitlv/klientiem.edgarsfoto.lv
    - /bin/cp -R web/api/* $DEPLOYPATH/api/
    - /bin/cp -R web/public/* $DEPLOYPATH/public/
    - /bin/cp -R web/storage/gallery_templates $DEPLOYPATH/storage/ 2>/dev/null || true
    # NEKAD nepārrakstīt access_index.json — tas dzīvo tikai serverī (pēc sync/saglabāšanas).
